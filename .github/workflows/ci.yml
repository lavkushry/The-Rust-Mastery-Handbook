name: Build Book

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  mdbook-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build
        run: mdbook build

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run JS unit tests
        run: node --test scripts/visual-edition.test.mjs scripts/utils.test.mjs scripts/export-pdf.test.mjs
