name: Build Book

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  mdbook-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Build
        run: mdbook build

  js-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run JS and structure tests
        run: npm test

  playwright-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install mdBook
        run: cargo install mdbook --locked

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build book
        run: mdbook build

      - name: Run visual and e2e regression tests
        run: npx playwright test
