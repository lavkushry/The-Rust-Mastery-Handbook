name: Feature request
description: Suggest a focused improvement for content, docs, or project workflows.
title: "enhancement: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user pain does this solve?
      placeholder: "As a reader/contributor, I struggle with..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Be specific and incremental.
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Primary impact area
      options:
        - Reader onboarding
        - Technical accuracy
        - Contributor experience
        - Build/release workflow
        - Discoverability/SEO
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but useful for design discussions.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
    validations:
      required: false
